apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
spec:
  selector:
    matchLabels:
      app: nginx
  replicas: 2 # Specifies that 2 identical pods should be running
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.14.2 # Uses the nginx:1.14.2 Docker image
        ports:
        - containerPort: 80 # Exposes port 80 within the container
