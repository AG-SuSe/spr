defaultNamespace: spr
helm:
  releaseName: spr-suse-private-registry-app
  # For some Fleet versions, we put the full OCI path in the 'chart' field
  chart: oci://registry.suse.com/private-registry/private-registry-helm
  version: 1.1.0
  values:
    externalURL: https://registry.support.rancher.space
    harborAdminPassword: AdminPassword123
  auth:
    secretName: suse-registry-secret
  values:
    externalURL: https://registry.support.rancher.space
    harborAdminPassword: AdminPassword123
