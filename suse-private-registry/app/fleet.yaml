defaultNamespace: spr
helm:
  releaseName: spr-suse-private-registry
  # The full OCI path is required here for the downloader to trigger
  chart: oci://registry.suse.com/private-registry/private-registry-helm
  version: 1.1.0
  # Fleet will look for this secret in the 'fleet-default' namespace
  auth:
    secretName: suse-registry-creds
  values:
    externalURL: https://registry.support.rancher.space
    harborAdminPassword: AdminPassword123
