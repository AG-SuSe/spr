kind: Bundle
metadata:
  name: spr-app
spec:
  # This forces the release into the 'spr' namespace
  targetNamespace: spr
  helm:
    repo: oci://registry.suse.com/private-registry
    chart: private-registry-helm
    version: 1.1.0
    auth:
      secretName: suse-registry
  
  values:
    # MANDATORY: The registry won't create pods without an external URL
    externalURL: https://registry.support.rancher.space

    # MANDATORY: These must be set for the DB/Core components to trigger
    harborAdminPassword: "Password123"
    database:
      internal:
        password: "Password123"
    redis:
      internal:
        password: "Password123"

    # CRITICAL: If you don't have a LoadBalancer, use 'ingress'
    expose:
      type: ingress
      ingress:
        hosts:
          core: registry.support.rancher.space
