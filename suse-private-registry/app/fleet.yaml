kind: Bundle
metadata:
  name: spr-app
spec:
  targetNamespace: spr
  helm:
    repo: oci://registry.suse.com/private-registry
    chart: private-registry-helm
    version: 1.1.0
    auth:
      secretName: suse-registry
    releaseName: spr
  values:
    externalURL: https://registry.support.rancher.space
    harborAdminPassword: "AdminPassword123"
    database:
      internal:
        password: "DefaultPassword123"
    redis:
      internal:
        password: "DefaultPassword123"
    expose:
      type: ingress
      tls:
        enabled: true
      ingress:
        hosts:
          core: registry.support.rancher.space
    persistence:
      enabled: true
