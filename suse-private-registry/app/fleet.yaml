# suse-private-registry/fleet.yaml
kind: Bundle
metadata:
  name: suse-private-registry
spec:
  helm:
    # Split the OCI URL into repo and chart name for better compatibility
    repo: oci://registry.suse.com/private-registry
    chart: private-registry-helm
    version: 1.1.0
    auth:
      secretName: suse-registry-creds
  values:
    # This is for pulling the IMAGES, not the chart
    imagePullSecrets:
      - name: suse-registry-creds
    expose:
      type: ingress
      tls:
        enabled: true
      ingress:
        hosts:
          core: registry.support.rancher.space
