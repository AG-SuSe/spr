defaultNamespace: spr
helm:
  releaseName: spr-suse-private-registry-app
  chart: oci://registry.suse.com/private-registry/private-registry-helm
  version: 1.1.0
  # Note: Since you've mapped the secret at the GitRepo level (helmSecretName),
  # this auth block is technically redundant but fine to keep.
  auth:
    secretName: suse-registry-creds
  values:
    # This ensures the pods can pull their images from registry.suse.com
    global:
      imagePullSecrets:
        - name: suse-registry
    externalURL: https://suseprivateregistry.support.rancher.space
    harborAdminPassword: AdminPassword123
